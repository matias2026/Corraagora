<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Criar conta | CorraAgora</title>

    <link rel="stylesheet" href="assets/css/auth.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script src="assets/js/supabase.js"></script>

</head>

<body>

<div class="login-container">

    <div class="login-card">

        <img src="assets/images/logo-corraagora.png"
             class="logo">

        <h1>Criar conta</h1>

        <p>Cadastre-se para organizar seus eventos.</p>

        <form id="registerForm">

            <input
                id="name"
                type="text"
                placeholder="Nome completo"
                required>

            <input
                id="email"
                type="email"
                placeholder="E-mail"
                required>

            <input
                id="password"
                type="password"
                placeholder="Senha"
                required>

            <button type="submit">

                Criar conta

            </button>

        </form>

        <a href="login.html">

            Já possui conta?

        </a>

    </div>

</div>

<script src="assets/js/auth.js"></script>

</body>

</html>
