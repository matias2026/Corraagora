<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Painel do Organizador | CorraAgora</title>

    <link rel="stylesheet" href="../assets/css/dashboard.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../assets/js/supabase.js"></script>
</head>

<body>

<div class="dashboard-layout">

    <aside class="sidebar">

        <a href="index.html" class="sidebar-brand">
            <img
                src="../images/logo-corraagora-compacta.png"
                alt="CorraAgora">
        </a>

        <nav class="sidebar-nav">

            <a href="index.html" class="active">
                Dashboard
            </a>

            <a href="eventos.html">
                Meus eventos
            </a>

            <a href="novo-evento.html">
                Novo evento
            </a>

            <a href="inscritos.html">
                Inscritos
            </a>

            <button id="logoutButton" type="button">
                Sair
            </button>

        </nav>

    </aside>

    <main class="dashboard-main">

        <header class="dashboard-header">

            <div>
                <p class="eyebrow">PAINEL DO ORGANIZADOR</p>
                <h1>Bem-vindo ao CorraAgora</h1>
            </div>

            <div class="user-info">
                <span id="organizerName">Organizador</span>
            </div>

        </header>

        <section class="summary-grid">

            <article class="summary-card">
                <span>Eventos publicados</span>
                <strong id="totalEvents">0</strong>
            </article>

            <article class="summary-card">
                <span>Total de inscritos</span>
                <strong id="totalRegistrations">0</strong>
            </article>

            <article class="summary-card">
                <span>Inscrições confirmadas</span>
                <strong id="confirmedRegistrations">0</strong>
            </article>

            <article class="summary-card">
                <span>Próximo evento</span>
                <strong id="nextEvent">Nenhum</strong>
            </article>

        </section>

        <section class="dashboard-section">

            <div class="section-header">
                <div>
                    <p class="eyebrow">EVENTOS</p>
                    <h2>Seus eventos recentes</h2>
                </div>

                <a href="novo-evento.html" class="primary-button">
                    Criar evento
                </a>
            </div>

            <div id="eventsList" class="events-list">
                <p>Carregando eventos...</p>
            </div>

        </section>

    </main>

</div>

<script src="../assets/js/dashboard.js"></script>

</body>
</html>
